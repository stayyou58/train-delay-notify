name: 火車誤點通知

on:
  # [TEMP: SD-4 之前的暫時方案] target input 讓不同 cron 各自觸發單一 target。
  # SD-4 完成後可移除 inputs 區塊。
  workflow_dispatch:
    inputs:
      target:
        description: "只跑指定 target name（留空則跑全部）"
        required: false
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run train check
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
          DISCORD_WEBHOOK_URL_SELF: ${{ secrets.DISCORD_WEBHOOK_URL_SELF }}
          DISCORD_WEBHOOK_URL_FAMILY_A: ${{ secrets.DISCORD_WEBHOOK_URL_FAMILY_A }}
          DISCORD_WEBHOOK_URL_FAMILY_B: ${{ secrets.DISCORD_WEBHOOK_URL_FAMILY_B }}
          TARGET_NAME: ${{ inputs.target }}  # [TEMP: SD-4 之前的暫時方案] SD-4 完成後可移除
        run: python check_train.py
